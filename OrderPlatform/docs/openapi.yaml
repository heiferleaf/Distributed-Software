openapi: 3.0.3
info:
  title: 电商平台 API
  description: 分布式微服务架构下的RESTful API规范
  version: 1.0.0
  contact:
    name: 开发者
    email: dev@example.com

servers:
  - url: http://localhost:8080/api
    description: 本地网关
  # - url: https://api.yourdomain.com/api
  #   description: 生产环境

security:
  -BearerAuth: []

paths:
  /auth/register:
    post:
      tags: [认证]
      summary: 用户注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/Error'

  /auth/login:
    post:
      tags: [认证]
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Error'

  /products:
    get:
      tags: [商品]
      summary: 获取商品列表（可分页、过滤）
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: size
          schema:
            type: integer
            default: 20
        - in: query
          name: categoryId
          schema:
            type: integer
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [price, sales]
      responses:
        '200':
          description: 商品列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'

  /products/{id}:
    get:
      tags: [商品]
      summary: 获取商品详情
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 商品详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

  /cart:
    get:
      tags: [购物车]
      summary: 获取购物车
      responses:
        '200':
          description: 购物车列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CartItem'
    post:
      tags: [购物车]
      summary: 添加商品到购物车
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartAddRequest'
      responses:
        '200':
          description: 添加成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  cartItem:
                    $ref: '#/components/schemas/CartItem'

  /cart/{id}:
    delete:
      tags: [购物车]
      summary: 删除购物车项
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 删除成功

  /orders:
    post:
      tags: [订单]
      summary: 创建订单
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '200':
          description: 订单创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/Error'
    get:
      tags: [订单]
      summary: 获取当前用户订单列表
      responses:
        '200':
          description: 订单列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        createdAt:
          type: string
          format: date-time

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        stock:
          type: integer
        imageUrl:
          type: string
        categoryId:
          type: integer
        createdAt:
          type: string
          format: date-time

    CartItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        quantity:
          type: integer
        product:
          $ref: '#/components/schemas/Product'

    Order:
      type: object
      properties:
        id:
          type: integer
        orderNo:
          type: string
        status:
          type: string
          enum: [PENDING_PAYMENT, PAID, SHIPPED, COMPLETED, CANCELLED]
        totalAmount:
          type: number
          format: double
        address:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        createdAt:
          type: string
          format: date-time

    OrderItem:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        price:
          type: number
          format: double

    AuthResponse:
      type: object
      properties:
        userId:
          type: integer
        username:
          type: string
        token:
          type: string

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    CartAddRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          minimum: 1

    OrderCreateRequest:
      type: object
      required: [address]
      properties:
        address:
          type: string
        couponCode:
          type: string

  responses:
    Error:
      description: 错误响应
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
              message:
                type: string