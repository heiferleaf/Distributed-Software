server:
  port: 8081
spring:
  application:
    name: service-auth

  datasource:
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/user?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    # 连接池配置

  data:
    redis:
      lettuce:
        pool:
          max-active: 8
          min-idle: 5
      password: redis123456
      host: redis # 通过服务器进行访问
      port: 6380

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:nacos:8848}
        namespace: dev
        group: DEFAULT_GROUP
        service: ${spring.application.name}
      config:
        enabled: false  # auth 服务配置简单，暂时不读取 Nacos 配置
        # 如果后续需要，可以开启：
        # server-addr: ${NACOS_ADDR:nacos:8848}
        # file-extension: yaml
        # namespace: dev
        # group: DEFAULT_GROUP

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.whu.serviceauth.entity.User



# ========= Redisson 配置（分布式锁、JWT黑名单） =========
redisson:
  single-server-config:
    address: "redis://redis:6379"
    password: "redis123456"
    connectionMinimumIdleSize: 10
    connectionPoolSize: 64
    idleConnectionTimeout: 100
    timeout: 300
    database: 1  # 可以用不同数据库存储不同业务数据

# ========= 日志配置 ==========
logging:
  level:
    com.whu.serviceauth: DEBUG
    org.springframework.cloud: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# ========= 应用自定义配置 =========
app:
  jwt:
    secret: "your-256-bit-secret-key-change-this-in-production"  # 生产环境用环境变量
    expiration-ms: 720000  # 2小时
    token-prefix: "Bearer "
  security:
    password-encode-strength: 12  # BCrypt strength
