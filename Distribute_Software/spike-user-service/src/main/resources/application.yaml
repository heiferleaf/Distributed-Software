server:
  port: 8081

spring:
  application:
    name: user-service

  config:
    import: "optional:nacos:${spring.application.name}.yml"

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3307}/spike_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:spike_user}
    password: ${MYSQL_PASSWORD:spike_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6380}

  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      discovery:
        service-name: ${spring.application.name}
        ip: ${NACOS_DISCOVERY_IP:localhost}
        port: ${server.port:8081}
        namespace: public # 默认的命名空间
        group: DEFAULT_GROUP # 默认的分组
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        # 配置文件扩展名
        file-extension: yml
        # 命名空间
        namespace: public
        # 分组
        group: DEFAULT_GROUP


