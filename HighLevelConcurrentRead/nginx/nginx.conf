# nginx/nginx.conf

worker_processes auto;  # 自动匹配 CPU 核数

events {
    worker_connections 1024;
    use epoll;           # Linux 下高效的 I/O 多路复用
    multi_accept on;     # 一次性接受所有新连接
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 日志格式：记录上游服务器地址，用于验证负载均衡
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    'upstream: $upstream_addr '        # 关键：显示转发到哪个后端
                    'rt: $request_time';               # 响应时间

    access_log /var/log/nginx/access.log main;

    sendfile on;           # 零拷贝发送文件，静态资源性能关键
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;               # 压缩传输

    # ==================== 负载均衡配置 ====================
    # 算法一：轮询（默认，平均分配）
    upstream backend_roundrobin {
        server backend1:8081;
        server backend2:8082;
        # keepalive 复用连接，减少 TCP 握手开销
        keepalive 32;
    }

    # 算法二：加权轮询（性能不同的服务器）
    upstream backend_weighted {
        server backend1:8081 weight=3;
        server backend2:8082 weight=1;
        keepalive 32;
    }

    # 算法三：ip_hash（同一 IP 固定到同一后端，解决 Session 问题）
    upstream backend_iphash {
        ip_hash;
        server backend1:8081;
        server backend2:8082;
    }

    # 算法四：least_conn（最少连接数，适合长连接场景）
    upstream backend_leastconn {
        least_conn;
        server backend1:8081;
        server backend2:8082;
        keepalive 32;
    }

    # 当前使用轮询（切换算法只需改这里）
    upstream backend {
        server backend1:8081;
        server backend2:8082;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # ==================== 动静分离 ====================
        # 静态资源：Nginx 直接处理，不走后端
        location /static/ {
            root /usr/share/nginx/html;
            # 浏览器缓存 7 天
            expires 7d;
            add_header Cache-Control "public, immutable";
            # 允许跨域（如果需要）
            add_header Access-Control-Allow-Origin *;
        }

        # 根路径也走静态
        location = / {
            root /usr/share/nginx/html/static;
            index index.html;
        }

        # ==================== API 代理转发 ====================
        location /api/ {
            proxy_pass http://backend;

            # 传递真实客户端 IP
            proxy_set_header Host $host; # 把域名传给后端
            proxy_set_header X-Real-IP $remote_addr;  # 把请求的真实IP传给后端
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 完整的代理链路

            # 超时配置
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # 使用 keepalive 复用连接
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # 健康检查端点
        location /health {
            proxy_pass http://backend/api/health;
        }
    }
}